<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6366F1">
  <title>HomeTask — Sign In</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236366F1'/><text x='50%' y='54%' dominant-baseline='middle' text-anchor='middle' font-size='58'>🏡</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    try{if(matchMedia('(prefers-color-scheme:dark)').matches)document.documentElement.setAttribute('data-theme','dark');}catch(e){}
  </script>
  <style>
    :root{
      --primary:#6366F1;--primary-dk:#4F46E5;--primary-lt:#EEF2FF;
      --wife-color:#F43F5E;
      --c-bg:#F8FAFC;--c-bg-card:#fff;--c-bg-subtle:#F1F5F9;
      --c-border:#E2E8F0;--c-border-in:#CBD5E1;
      --c-text:#0F172A;--c-text-muted:#64748B;--c-text-dim:#94A3B8;
      --danger:#EF4444;--danger-lt:#FEE2E2;
      --shadow-lg:0 16px 40px rgba(15,23,42,.10),0 4px 8px rgba(15,23,42,.05);
      --radius:14px;--radius-sm:9px;--t:.15s;
    }
    [data-theme="dark"]{
      --c-bg:#0B0F1A;--c-bg-card:#131929;--c-bg-subtle:#1A2236;
      --c-border:#1E2D45;--c-border-in:#283A55;
      --c-text:#F1F5F9;--c-text-muted:#94A3B8;--c-text-dim:#475569;
      --primary-lt:rgba(99,102,241,.18);
      --danger-lt:rgba(239,68,68,.14);
      --shadow-lg:0 16px 40px rgba(0,0,0,.7);
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
      background:var(--c-bg);color:var(--c-text);min-height:100vh;
      display:flex;align-items:center;justify-content:center;padding:20px;
      transition:background var(--t);
    }

    /* Subtle geometric background */
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 10%, rgba(99,102,241,.07) 0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 85% 90%, rgba(244,63,94,.05) 0%, transparent 55%);
    }

    .card{
      background:var(--c-bg-card);border-radius:var(--radius);
      box-shadow:var(--shadow-lg);width:100%;max-width:390px;
      border:1px solid var(--c-border);overflow:hidden;position:relative;z-index:1;
    }

    /* Top gradient accent */
    .card-accent{height:3px;background:linear-gradient(90deg,var(--primary),var(--wife-color))}

    .card-body{padding:32px 32px 28px}

    .logo{text-align:center;margin-bottom:26px}
    .logo-icon-wrap{
      width:52px;height:52px;border-radius:13px;
      background:linear-gradient(135deg,var(--primary),var(--wife-color));
      display:inline-flex;align-items:center;justify-content:center;font-size:24px;
      margin-bottom:10px;box-shadow:0 4px 16px rgba(99,102,241,.3);
    }
    .logo-name{
      font-size:22px;font-weight:700;font-family:'Lora',Georgia,serif;
      background:linear-gradient(135deg,var(--primary),var(--wife-color));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      margin-bottom:3px;
    }
    .logo-sub{font-size:12.5px;color:var(--c-text-dim)}

    .form-title{font-size:16px;font-weight:700;color:var(--c-text);margin-bottom:4px}
    .form-sub{font-size:12.5px;color:var(--c-text-muted);margin-bottom:22px;line-height:1.5}

    .fg{margin-bottom:14px}
    label{
      display:block;font-size:11px;font-weight:700;color:var(--c-text-muted);
      margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;
    }
    input[type=text],input[type=password]{
      width:100%;padding:10px 12px;
      border:1.5px solid var(--c-border-in);border-radius:var(--radius-sm);
      font-size:13.5px;color:var(--c-text);background:var(--c-bg-card);
      outline:none;transition:all var(--t);font-family:inherit;
    }
    input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
    input::placeholder{color:var(--c-text-dim)}

    .btn{
      width:100%;padding:11px;border-radius:var(--radius-sm);
      font-size:13.5px;font-weight:700;cursor:pointer;border:none;
      transition:all var(--t);font-family:inherit;margin-top:4px;
      display:flex;align-items:center;justify-content:center;gap:7px;
    }
    .btn-primary{
      background:var(--primary);color:#fff;
      box-shadow:0 2px 8px rgba(99,102,241,.35);
    }
    .btn-primary:hover{background:var(--primary-dk);box-shadow:0 4px 14px rgba(99,102,241,.4);transform:translateY(-1px)}
    .btn-primary:active{transform:translateY(0)}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}

    .error{
      background:var(--danger-lt);color:var(--danger);padding:9px 13px;
      border-radius:var(--radius-sm);font-size:12.5px;font-weight:500;
      margin-bottom:14px;display:none;
    }
    .error.show{display:block}

    .card-footer{
      text-align:center;font-size:11.5px;color:var(--c-text-dim);
      padding:14px 32px;border-top:1px solid var(--c-border);
      background:var(--c-bg-subtle);
    }

    .spinner{
      display:inline-block;width:14px;height:14px;
      border:2px solid rgba(255,255,255,.4);border-top-color:#fff;
      border-radius:50%;animation:spin .6s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(max-width:440px){
      .card-body{padding:24px 22px}
      .card-footer{padding:12px 22px}
    }
  </style>
</head>
<body>
<div class="card">
  <div class="card-accent"></div>
  <div class="card-body">
    <div class="logo">
      <div class="logo-icon-wrap">🏡</div>
      <div class="logo-name">HomeTask</div>
      <div class="logo-sub">Home Task Manager</div>
    </div>
    <div class="form-title">Welcome back</div>
    <div class="form-sub">Sign in to manage your household tasks</div>
    <div class="error" id="errorMsg"></div>
    <form id="loginForm" onsubmit="doLogin(event)">
      <div class="fg">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Your username" autocomplete="username" required>
      </div>
      <div class="fg">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Your password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Sign In</button>
    </form>
  </div>
  <div class="card-footer">Private household app · Invite only</div>
</div>

<script>
  (function(){
    const token = localStorage.getItem('ht_token');
    if (token) window.location.replace('/');
  })();

  async function doLogin(e) {
    e.preventDefault();
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('submitBtn');
    const errEl = document.getElementById('errorMsg');

    errEl.classList.remove('show');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Signing in…';

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (!res.ok) {
        showError(data.error || 'Sign in failed. Please try again.');
        return;
      }
      localStorage.setItem('ht_token', data.token);
      localStorage.setItem('ht_user', data.user);
      window.location.replace('/');
    } catch (err) {
      showError('Network error — please check your connection.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Sign In';
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').innerHTML = 'Sign In';
  }
</script>
</body>
</html>
