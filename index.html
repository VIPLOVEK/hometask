<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6B8E23">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>HomeTask — Home Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Anti-flash: set theme before first paint -->
  <script>
    try{var _t=JSON.parse(localStorage.getItem('hometask_v1')||'{}');
    var _th=(_t.settings||{}).theme||'system';
    if(_th==='dark'||(_th==='system'&&matchMedia('(prefers-color-scheme:dark)').matches))
      document.documentElement.setAttribute('data-theme','dark');}catch(e){}
  </script>
  <style>
    /* ── TOKENS: LIGHT — Modern Botanical ────────────────────── */
    :root {
      --c-bg:          #FAFAF8;  /* Alabaster */
      --c-bg-card:     #FFFFFF;
      --c-bg-input:    #FFFFFF;
      --c-bg-subtle:   #F2EFE8;
      --c-border:      #E8E3DA;
      --c-border-in:   #D6CFC3;
      --c-text:        #2C2416;
      --c-text-muted:  #7A6E5E;
      --c-text-dim:    #B0A492;

      /* Olive Drab brand */
      --primary:       #6B8E23;
      --primary-dk:    #556B1A;
      --primary-lt:    #EFF4DC;
      --primary-tx:    #4A6118;

      /* Warm people colors */
      --me-color:      #5B6FA6;
      --me-light:      #EAEEf8;
      --wife-color:    #C2714F;  /* Terracotta */
      --wife-light:    #FAF0EB;
      --both-color:    #8B7355;
      --both-light:    #F5EFE5;

      /* Status */
      --ok:            #6B8E23;
      --ok-lt:         #EFF4DC;
      --danger:        #E67E22;  /* Carrot Orange — overdue */
      --danger-lt:     #FDF0E6;
      --warn:          #B8860B;
      --warn-lt:       #FBF5E0;
      --info:          #5B6FA6;
      --info-lt:       #EAEEf8;

      /* Soft neumorphism-lite shadows */
      --shadow-sm:     0 2px 8px rgba(44,36,22,.06),0 1px 2px rgba(44,36,22,.04);
      --shadow-md:     0 8px 28px rgba(44,36,22,.09),0 2px 6px rgba(44,36,22,.05);
      --shadow-lg:     0 20px 50px rgba(44,36,22,.11),0 6px 14px rgba(44,36,22,.06);

      --sidebar-w:     272px;
      --nav-h:         64px;
      --radius:        20px;
      --radius-sm:     14px;
      --radius-lg:     28px;
      --t:             .18s;
    }

    /* ── TOKENS: DARK — Warm Dark ──────────────────────────────── */
    [data-theme="dark"] {
      --c-bg:          #1A1510;
      --c-bg-card:     #231E18;
      --c-bg-input:    #231E18;
      --c-bg-subtle:   #2D2720;
      --c-border:      #3D3628;
      --c-border-in:   #4E4538;
      --c-text:        #F5F0E8;
      --c-text-muted:  #B8AA98;
      --c-text-dim:    #7A6E60;

      --primary-lt:    rgba(107,142,35,.15);
      --primary-tx:    #A8C45A;

      --me-light:      rgba(91,111,166,.18);
      --wife-light:    rgba(194,113,79,.16);
      --both-light:    rgba(139,115,85,.16);

      --ok-lt:         rgba(107,142,35,.15);
      --danger-lt:     rgba(230,126,34,.15);
      --warn-lt:       rgba(184,134,11,.14);
      --info-lt:       rgba(91,111,166,.16);

      --shadow-sm:     0 2px 8px rgba(0,0,0,.45);
      --shadow-md:     0 8px 24px rgba(0,0,0,.55);
      --shadow-lg:     0 20px 50px rgba(0,0,0,.65);
    }

    /* ── RESET ─────────────────────────────────────────────────── */
    *{margin:0;padding:0;box-sizing:border-box}
    html{color-scheme:light dark}
    body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
      background:var(--c-bg);color:var(--c-text);min-height:100vh;
      transition:background var(--t),color var(--t);line-height:1.5}
    h1,h2,h3,.topbar-title,.card-title,.set-title,.modal-ttl,.room-name,.stat-label,.section-hdr-text{
      font-family:'Lora',Georgia,'Times New Roman',serif}
    button{font-family:inherit;cursor:pointer}
    input,select,textarea{font-family:inherit}
    a{color:var(--primary)}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-thumb{background:var(--c-border);border-radius:100px}

    /* ── LAYOUT SHELL ──────────────────────────────────────────── */
    .app{display:flex;min-height:100vh}

    /* Sidebar — glassmorphism */
    .sidebar{width:var(--sidebar-w);
      background:rgba(250,250,248,.78);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border-right:1px solid rgba(107,142,35,.18);
      display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;
      overflow-y:auto;z-index:100;transition:background var(--t)}
    [data-theme="dark"] .sidebar{background:rgba(26,21,16,.82);border-right:1px solid rgba(107,142,35,.12)}
    .sidebar-logo{padding:22px 18px 18px;border-bottom:1px solid var(--c-border)}
    .logo-mark{display:flex;align-items:center;gap:9px;margin-bottom:3px}
    .logo-icon-wrap{width:36px;height:36px;border-radius:10px;
      background:linear-gradient(135deg,var(--primary),#C2714F);
      display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;
      box-shadow:0 2px 8px rgba(107,142,35,.35)}
    .logo-text{font-size:18px;font-weight:800;letter-spacing:-.3px;
      background:linear-gradient(135deg,var(--primary),#C2714F);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      font-family:'Lora',Georgia,serif}
    .logo-sub{font-size:11px;color:var(--c-text-dim);margin-top:1px;letter-spacing:.01em}
    .sidebar-nav{padding:12px 8px;flex:1}
    .nav-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
      color:var(--c-text-dim);padding:10px 10px 5px}
    .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:100px;
      font-size:13px;font-weight:500;color:var(--c-text-muted);transition:all var(--t);
      margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
    .nav-item:hover{background:var(--c-bg-subtle);color:var(--c-text)}
    .nav-item.active{background:var(--primary);color:#fff;font-weight:600;
      box-shadow:0 2px 8px rgba(107,142,35,.35)}
    .nav-item.active .nav-icon{filter:none}
    .nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
    .nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:9.5px;
      font-weight:700;padding:2px 6px;border-radius:100px;min-width:18px;text-align:center}
    .nav-item.active .nav-badge{background:#fff;color:var(--danger)}
    .sidebar-bottom{padding:12px 14px;border-top:1px solid var(--c-border)}
    .member-chips{display:flex;gap:8px;margin-bottom:12px}
    .avatar-bubble{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
      padding:10px 6px;border-radius:var(--radius-sm);background:var(--c-bg-subtle);
      transition:all var(--t);cursor:default}
    .avatar-inner{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;
      justify-content:center;font-size:17px;font-weight:800;color:#fff;
      transition:box-shadow var(--t);font-family:'Inter',sans-serif}
    .avatar-bubble.me .avatar-inner{background:linear-gradient(135deg,var(--me-color),#7B8FC0)}
    .avatar-bubble.wife .avatar-inner{background:linear-gradient(135deg,var(--wife-color),#D4895C)}
    .avatar-bubble.leading .avatar-inner{box-shadow:0 0 0 3px #fff,0 0 0 5px var(--primary)}
    .avatar-bubble.leading{background:var(--primary-lt)}
    .avatar-name{font-size:11px;font-weight:600;color:var(--c-text)}
    .avatar-score{font-size:10px;color:var(--c-text-dim)}
    .avatar-crown{font-size:12px;line-height:1}
    .sidebar-actions{display:flex;gap:6px;margin-bottom:8px}
    .icon-btn{width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--c-border);
      background:var(--c-bg-card);display:flex;align-items:center;justify-content:center;
      font-size:15px;cursor:pointer;transition:all var(--t);flex:1;box-shadow:var(--shadow-sm)}
    .icon-btn:hover{border-color:var(--primary);background:var(--primary-lt);color:var(--primary)}

    /* Sync pill */
    .sync-pill{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;
      padding:7px 12px;border-radius:100px;cursor:pointer;border:none;width:100%;transition:all var(--t)}
    .sync-pill.connected{background:var(--ok-lt);color:var(--ok)}
    .sync-pill.connecting{background:var(--warn-lt);color:var(--warn)}
    .sync-pill.offline{background:var(--c-bg-subtle);color:var(--c-text-muted)}
    .sync-pill.error{background:var(--danger-lt);color:var(--danger)}
    .sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
    .sync-pill.connected .sync-dot{background:var(--ok)}
    .sync-pill.connecting .sync-dot{background:var(--warn);animation:pulse 1s infinite}
    .sync-pill.offline .sync-dot{background:var(--c-text-dim)}
    .sync-pill.error .sync-dot{background:var(--danger)}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

    /* Main */
    .main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}

    /* Topbar */
    .topbar{background:rgba(250,250,248,.92);backdrop-filter:blur(12px);
      border-bottom:1px solid var(--c-border);
      padding:14px 26px;display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;z-index:50;transition:background var(--t)}
    [data-theme="dark"] .topbar{background:rgba(26,21,16,.92)}
    .topbar-title{font-size:17px;font-weight:700;color:var(--c-text);letter-spacing:-.2px}
    .topbar-right{display:flex;align-items:center;gap:9px}
    .search-box{display:flex;align-items:center;gap:7px;background:var(--c-bg-card);
      border-radius:100px;padding:7px 14px;border:1.5px solid var(--c-border);
      transition:all var(--t);box-shadow:var(--shadow-sm)}
    .search-box:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px rgba(22,163,74,.12)}
    .search-box input{border:none;background:none;outline:none;font-size:13px;
      color:var(--c-text);width:160px}
    .search-box input::placeholder{color:var(--c-text-dim)}
    .page{padding:24px 26px;flex:1}

    /* Bottom nav */
    .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);
      background:rgba(250,250,248,.95);backdrop-filter:blur(12px);
      border-top:1px solid var(--c-border);z-index:100;padding:0 8px}
    [data-theme="dark"] .bottom-nav{background:rgba(26,21,16,.95)}
    .bnav-inner{display:flex;height:100%}
    .bnav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:3px;border:none;background:none;color:var(--c-text-dim);font-size:10px;
      font-weight:500;cursor:pointer;transition:color var(--t);position:relative;padding:0 4px}
    .bnav-tab.active{color:var(--primary);font-weight:700}
    .bnav-tab .bnav-icon{font-size:22px;line-height:1}
    .bnav-badge{position:absolute;top:5px;right:calc(50% - 20px);background:var(--danger);
      color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:100px;min-width:16px;text-align:center}

    /* ── BUTTONS ────────────────────────────────────────────────── */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:100px;
      font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all var(--t);font-family:inherit;letter-spacing:-.01em}
    .btn-primary{background:var(--primary);color:#fff;box-shadow:0 2px 8px rgba(107,142,35,.35)}
    .btn-primary:hover{background:var(--primary-dk);box-shadow:0 4px 14px rgba(107,142,35,.4);transform:translateY(-1px)}
    .btn-primary:active{transform:translateY(0)}
    .btn-secondary{background:var(--c-bg-card);color:var(--c-text-muted);border:1.5px solid var(--c-border);box-shadow:var(--shadow-sm)}
    .btn-secondary:hover{border-color:var(--c-border-in);color:var(--c-text);background:var(--c-bg-subtle)}
    .btn-danger{background:var(--danger-lt);color:var(--danger);border:1.5px solid transparent}
    .btn-danger:hover{background:var(--danger);color:#fff;border-color:var(--danger)}
    .btn-sm{padding:5px 14px;font-size:12px}
    .btn-xs{padding:3px 9px;font-size:11px}

    /* ── STATS GRID ─────────────────────────────────────────────── */
    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
    .stat-card{background:var(--c-bg-card);border-radius:var(--radius);padding:18px 16px;
      border:1px solid var(--c-border);box-shadow:var(--shadow-sm);transition:all var(--t);
      position:relative;overflow:hidden}
    .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
    .stat-card:nth-child(1)::before{background:var(--danger)}
    .stat-card:nth-child(2)::before{background:var(--warn)}
    .stat-card:nth-child(3)::before{background:var(--ok)}
    .stat-card:nth-child(4)::before{background:var(--primary)}
    .stat-icon{font-size:24px;margin-bottom:10px}
    .stat-label{font-size:11px;color:var(--c-text-muted);font-weight:600;margin-bottom:4px;
      text-transform:uppercase;letter-spacing:.05em}
    .stat-value{font-size:30px;font-weight:800;line-height:1;letter-spacing:-.02em}
    .stat-sub{font-size:11px;color:var(--c-text-dim);margin-top:4px}

    /* Progress bar */
    .prog-wrap{background:var(--c-bg-subtle);border-radius:100px;height:8px;overflow:hidden}
    .prog-bar{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--me-color),var(--wife-color));transition:width .6s ease}
    .prog-bar-ok{background:linear-gradient(90deg,var(--primary),#d97706)}

    /* Day progress */
    .day-prog{background:var(--c-bg-card);border-radius:var(--radius);padding:16px 20px;
      border:1px solid var(--c-border);margin-bottom:20px;box-shadow:var(--shadow-sm)}
    .day-prog-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .day-prog-lbl{font-size:13px;font-weight:600;color:var(--c-text)}
    .day-prog-pct{font-size:13px;font-weight:700;color:var(--ok)}

    /* ── DASH GRID ──────────────────────────────────────────────── */
    .dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .card{background:var(--c-bg-card);border-radius:var(--radius);border:1px solid var(--c-border);
      box-shadow:var(--shadow-sm);overflow:hidden;transition:background var(--t)}
    .card-hdr{padding:14px 18px;border-bottom:1px solid var(--c-border);
      display:flex;align-items:center;justify-content:space-between}
    .card-title{font-size:13px;font-weight:700;color:var(--c-text);letter-spacing:-.01em}
    .card-body{padding:6px}

    /* ── TASK ITEM ──────────────────────────────────────────────── */
    .task-item{display:flex;align-items:flex-start;gap:11px;padding:10px 12px;
      border-radius:var(--radius-sm);cursor:pointer;transition:background var(--t);position:relative}
    .task-item:hover{background:var(--c-bg-subtle)}
    .task-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--c-border-in);
      flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;
      font-weight:700;transition:all var(--t);cursor:pointer;margin-top:2px;color:#fff}
    .task-check:hover{border-color:var(--ok);background:var(--ok-lt)}
    .task-check.done{border-color:var(--ok);background:var(--ok);box-shadow:0 1px 4px rgba(22,163,74,.4)}
    .task-info{flex:1;min-width:0}
    .task-title{font-size:13.5px;font-weight:500;color:var(--c-text);margin-bottom:5px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.01em}
    .task-title.struck{text-decoration:line-through;color:var(--c-text-dim)}
    .task-meta{display:flex;align-items:center;flex-wrap:wrap;gap:4px}
    .task-actions{display:flex;gap:4px;opacity:0;transition:opacity var(--t);flex-shrink:0;margin-top:1px}
    .task-item:hover .task-actions{opacity:1}
    .act-btn{width:28px;height:28px;border-radius:8px;border:none;background:var(--c-bg-subtle);
      cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;
      transition:all var(--t);color:var(--c-text-muted)}
    .act-btn:hover{background:var(--c-border);transform:scale(1.05)}
    .act-btn.del:hover{background:var(--danger-lt);color:var(--danger)}
    .act-btn.snooze:hover{background:var(--warn-lt);color:var(--warn)}

    /* Tags */
    .tag{display:inline-flex;align-items:center;font-size:10.5px;font-weight:600;
      padding:2px 8px;border-radius:100px;white-space:nowrap;letter-spacing:.01em}
    .tag-cat{background:var(--c-bg-subtle);color:var(--c-text-muted)}
    .tag-freq{background:var(--primary-lt);color:var(--primary-tx)}
    .tag-overdue{background:var(--danger-lt);color:var(--danger)}
    .tag-today{background:var(--warn-lt);color:var(--warn)}
    .tag-soon{background:var(--ok-lt);color:var(--ok)}
    .tag-me{background:var(--me-light);color:var(--me-color)}
    .tag-wife{background:var(--wife-light);color:var(--wife-color)}
    .tag-both{background:var(--both-light);color:var(--both-color)}
    .streak{display:inline-flex;align-items:center;gap:2px;font-size:10.5px;font-weight:700;
      color:var(--warn);padding:2px 7px;background:var(--warn-lt);border-radius:100px}

    /* ── TASKS PAGE ─────────────────────────────────────────────── */
    .tasks-wrap{background:var(--c-bg-card);border-radius:var(--radius);
      border:1px solid var(--c-border);box-shadow:var(--shadow-sm);overflow:hidden}
    .filter-bar{padding:12px 16px;border-bottom:1px solid var(--c-border);
      display:flex;align-items:center;gap:6px;flex-wrap:wrap;background:var(--c-bg-subtle)}
    .filter-btn{padding:5px 13px;border-radius:100px;border:1.5px solid var(--c-border);
      background:var(--c-bg-card);font-size:12px;font-weight:600;color:var(--c-text-muted);
      cursor:pointer;transition:all var(--t);font-family:inherit}
    .filter-btn:hover{border-color:var(--primary);color:var(--primary)}
    .filter-btn.active{border-color:var(--primary);background:var(--primary);color:#fff;box-shadow:0 1px 4px rgba(22,163,74,.3)}
    .filter-sel{padding:5px 10px;border-radius:100px;border:1.5px solid var(--c-border);
      font-size:12px;font-weight:600;color:var(--c-text-muted);background:var(--c-bg-card);
      cursor:pointer;outline:none;font-family:inherit;transition:all var(--t)}
    .filter-sel:focus{border-color:var(--primary)}
    .tasks-list{padding:6px}
    .group-hdr{padding:10px 12px 3px;font-size:10px;font-weight:700;text-transform:uppercase;
      letter-spacing:.1em;color:var(--c-text-dim)}

    /* ── WEEKLY VIEW ────────────────────────────────────────────── */
    .week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
    .week-day{background:var(--c-bg-card);border-radius:var(--radius);
      border:1px solid var(--c-border);overflow:hidden;min-height:120px}
    .week-day.is-today{border-color:var(--primary)}
    .week-day-hdr{padding:8px 10px;font-size:11px;font-weight:700;
      border-bottom:1px solid var(--c-border);color:var(--c-text-muted)}
    .week-day.is-today .week-day-hdr{background:var(--primary-lt);color:var(--primary)}
    .week-day-body{padding:4px}
    .week-task{padding:5px 7px;border-radius:6px;margin-bottom:3px;font-size:11.5px;
      font-weight:500;color:var(--c-text);background:var(--c-bg-subtle);cursor:pointer;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background var(--t)}
    .week-task:hover{background:var(--primary-lt);color:var(--primary)}
    .week-more{padding:4px 7px;font-size:11px;color:var(--c-text-dim);font-weight:600}
    .week-empty{padding:10px 8px;font-size:11px;color:var(--c-text-dim);text-align:center}

    /* ── HISTORY ────────────────────────────────────────────────── */
    .hist-item{display:flex;align-items:center;gap:10px;padding:10px 0;
      border-bottom:1px solid var(--c-border)}
    .hist-item:last-child{border-bottom:none}
    .hist-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .hist-info{flex:1;min-width:0}
    .hist-title{font-size:13px;font-weight:500;color:var(--c-text);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .hist-meta{font-size:11.5px;color:var(--c-text-dim);margin-top:2px}

    /* ── MEMBER STATS ───────────────────────────────────────────── */
    .member-stats{display:flex;gap:10px;padding:14px 16px}
    .mstat{flex:1;padding:12px;border-radius:var(--radius-sm);text-align:center}
    .mstat.me{background:var(--me-light);color:var(--me-color)}
    .mstat.wife{background:var(--wife-light);color:var(--wife-color)}
    .mstat-num{font-size:24px;font-weight:800}
    .mstat-lbl{font-size:11px;font-weight:500;opacity:.8}

    /* ── EMPTY STATE ────────────────────────────────────────────── */
    .empty{text-align:center;padding:44px 20px;color:var(--c-text-dim)}
    .empty-ico{font-size:40px;margin-bottom:8px}
    .empty-ttl{font-size:14px;font-weight:600;color:var(--c-text-muted);margin-bottom:3px}
    .empty-sub{font-size:12.5px}

    /* ── SETTINGS ───────────────────────────────────────────────── */
    .set-section{background:var(--c-bg-card);border-radius:var(--radius);
      border:1px solid var(--c-border);padding:20px;margin-bottom:16px;
      box-shadow:var(--shadow-sm);transition:background var(--t)}
    .set-title{font-size:14.5px;font-weight:700;margin-bottom:13px;color:var(--c-text)}
    .set-subtitle{font-size:12px;color:var(--c-text-muted);margin-bottom:12px;line-height:1.5}
    .theme-opts{display:flex;gap:8px}
    .theme-opt{flex:1;padding:9px 8px;border-radius:var(--radius-sm);border:2px solid var(--c-border);
      cursor:pointer;text-align:center;font-size:12px;font-weight:600;color:var(--c-text-muted);
      transition:all var(--t);background:var(--c-bg-card)}
    .theme-opt:hover{border-color:var(--primary);color:var(--primary)}
    .theme-opt.active{border-color:var(--primary);background:var(--primary-lt);color:var(--primary)}
    .theme-opt .topt-ico{font-size:20px;margin-bottom:4px}
    .toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .toggle-lbl{font-size:13px;font-weight:500;color:var(--c-text)}
    .toggle{position:relative;width:40px;height:22px;flex-shrink:0}
    .toggle input{opacity:0;width:0;height:0}
    .toggle-slider{position:absolute;inset:0;background:var(--c-border);border-radius:100px;
      cursor:pointer;transition:background var(--t)}
    .toggle-slider:before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;
      background:#fff;border-radius:50%;transition:transform var(--t)}
    .toggle input:checked+.toggle-slider{background:var(--primary)}
    .toggle input:checked+.toggle-slider:before{transform:translateX(18px)}
    .notif-note{font-size:11.5px;color:var(--c-text-dim);margin-top:6px;line-height:1.4}
    .archived-list{margin-top:8px}
    .archived-item{display:flex;align-items:center;gap:8px;padding:8px 0;
      border-bottom:1px solid var(--c-border)}
    .archived-item:last-child{border-bottom:none}
    .archived-name{flex:1;font-size:13px;color:var(--c-text-muted)}
    .cat-breakdown{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .cat-row{display:flex;align-items:center;justify-content:space-between;
      padding:7px 10px;background:var(--c-bg-subtle);border-radius:var(--radius-sm)}
    .cat-row-lbl{font-size:12.5px;color:var(--c-text)}
    .cat-row-cnt{font-size:12.5px;font-weight:700;color:var(--c-text-muted)}
    .setup-steps{counter-reset:step;margin:10px 0}
    .setup-step{counter-increment:step;display:flex;gap:10px;margin-bottom:8px;
      font-size:13px;color:var(--c-text-muted);align-items:flex-start;line-height:1.5}
    .setup-step::before{content:counter(step);width:20px;height:20px;border-radius:50%;
      background:var(--primary-lt);color:var(--primary);font-size:11px;font-weight:700;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}

    /* ── ROOMS VIEW ─────────────────────────────────────────────── */
    .rooms-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
    .room-card{background:var(--c-bg-card);border-radius:var(--radius);padding:20px 18px;
      border:1px solid var(--c-border);cursor:pointer;transition:all var(--t);
      box-shadow:var(--shadow-sm);text-align:center;position:relative;overflow:hidden}
    .room-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md);border-color:var(--primary)}
    .room-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
    .room-card[data-room="kitchen"]::before{background:linear-gradient(90deg,#E8B86D,#F4A261)}
    .room-card[data-room="bathroom"]::before{background:linear-gradient(90deg,#7EC8E3,#4FACFE)}
    .room-card[data-room="bedroom"]::before{background:linear-gradient(90deg,#C4A8D4,#9B8EC4)}
    .room-card[data-room="living"]::before{background:linear-gradient(90deg,#D4B896,#C4A278)}
    .room-card[data-room="laundry"]::before{background:linear-gradient(90deg,#82C4C8,#5BAAB2)}
    .room-card[data-room="garden"]::before{background:linear-gradient(90deg,#90BF72,#6B8E23)}
    .room-card[data-room="maint"]::before{background:linear-gradient(90deg,#C4A878,#A8885A)}
    .room-card[data-room="other"]::before{background:linear-gradient(90deg,#B8A8C8,#9888B0)}
    .room-icon{font-size:36px;margin-bottom:8px;display:block}
    .room-name{font-size:13.5px;font-weight:700;color:var(--c-text);margin-bottom:3px;letter-spacing:-.01em}
    .room-count{font-size:11.5px;color:var(--c-text-dim);margin-bottom:0}
    .room-ring{display:flex;justify-content:center;margin:10px 0 6px}
    .room-status{font-size:11px;font-weight:600}
    .room-status.good{color:var(--ok)}
    .room-status.warn{color:var(--warn)}
    .room-status.bad{color:var(--danger)}
    .room-reset-btn{width:100%;margin-top:10px;padding:5px 8px;border-radius:100px;
      border:1.5px solid var(--c-border);background:var(--c-bg-subtle);font-size:11px;
      font-weight:600;color:var(--c-text-muted);cursor:pointer;transition:all var(--t);font-family:inherit}
    .room-reset-btn:hover{border-color:var(--warn);background:var(--warn-lt);color:var(--warn)}

    /* ── SHOPPING VIEW ───────────────────────────────────────────── */
    .shop-wrap{background:var(--c-bg-card);border-radius:var(--radius);
      border:1px solid var(--c-border);box-shadow:var(--shadow-sm);overflow:hidden;max-width:600px}
    .shop-add{display:flex;gap:8px;padding:14px 16px;border-bottom:1px solid var(--c-border)}
    .shop-add input{flex:1;padding:9px 12px;border:1.5px solid var(--c-border-in);
      border-radius:var(--radius-sm);font-size:13.5px;color:var(--c-text);
      background:var(--c-bg-input);outline:none;transition:border-color var(--t);font-family:inherit}
    .shop-add input:focus{border-color:var(--primary)}
    .shop-add input::placeholder{color:var(--c-text-dim)}
    .shop-list{padding:6px}
    .shop-item{display:flex;align-items:center;gap:10px;padding:10px 10px;
      border-radius:var(--radius-sm);transition:background var(--t)}
    .shop-item:hover{background:var(--c-bg-subtle)}
    .shop-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--c-border-in);
      flex-shrink:0;display:flex;align-items:center;justify-content:center;
      cursor:pointer;transition:all var(--t);color:#fff;font-size:11px;font-weight:700}
    .shop-check:hover{border-color:var(--ok)}
    .shop-check.done{background:var(--ok);border-color:var(--ok)}
    .shop-text{flex:1;font-size:13.5px;color:var(--c-text);font-weight:500}
    .shop-text.done{text-decoration:line-through;color:var(--c-text-dim)}
    .shop-del{width:26px;height:26px;border-radius:6px;border:none;background:none;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      font-size:13px;color:var(--c-text-dim);opacity:0;transition:all var(--t)}
    .shop-item:hover .shop-del{opacity:1}
    .shop-del:hover{background:var(--danger-lt);color:var(--danger)}
    .shop-footer{padding:10px 16px;border-top:1px solid var(--c-border);
      display:flex;align-items:center;justify-content:space-between}
    .shop-count{font-size:12px;color:var(--c-text-dim)}

    /* ── POINTS BANNER ───────────────────────────────────────────── */
    .points-banner{background:linear-gradient(135deg,#556B1A 0%,#6B8E23 40%,#C2714F 100%);
      border-radius:var(--radius);padding:18px 24px;margin-bottom:22px;color:#fff;
      display:flex;align-items:center;justify-content:space-between;
      box-shadow:0 4px 20px rgba(22,163,74,.3)}
    .points-person{text-align:center}
    .points-num{font-size:32px;font-weight:900;line-height:1;letter-spacing:-.03em}
    .points-lbl{font-size:11px;opacity:.85;margin-top:3px;font-weight:500}
    .points-vs{font-size:13px;font-weight:600;opacity:.65}
    .points-trophy{font-size:24px;margin-top:4px}

    /* ── CHARTS ─────────────────────────────────────────────────── */
    .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:0}
    .chart-card{background:var(--c-bg-subtle);border-radius:var(--radius-sm);padding:14px}
    .chart-ttl{font-size:12px;font-weight:600;color:var(--c-text-muted);margin-bottom:10px}
    .chart-wrap svg{display:block}
    .chart-legend{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
    .chart-leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--c-text-muted)}
    .chart-leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

    /* ── MODAL ──────────────────────────────────────────────────── */
    .overlay{position:fixed;inset:0;background:rgba(28,25,23,.5);backdrop-filter:blur(6px);
      z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal{background:var(--c-bg-card);border-radius:var(--radius-lg);width:100%;max-width:520px;
      box-shadow:var(--shadow-lg);overflow:hidden;animation:slideUp .2s cubic-bezier(.16,1,.3,1);
      transition:background var(--t);border:1px solid var(--c-border)}
    @keyframes slideUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
    .modal-hdr{padding:18px 22px;border-bottom:1px solid var(--c-border);
      display:flex;align-items:center;justify-content:space-between;background:var(--c-bg-subtle)}
    .modal-ttl{font-size:15px;font-weight:700;color:var(--c-text);letter-spacing:-.01em}
    .modal-x{width:30px;height:30px;border-radius:100px;border:none;
      background:var(--c-bg-card);cursor:pointer;font-size:14px;
      display:flex;align-items:center;justify-content:center;
      transition:all var(--t);color:var(--c-text-muted);border:1px solid var(--c-border)}
    .modal-x:hover{background:var(--danger-lt);color:var(--danger);border-color:var(--danger)}
    .modal-body{padding:22px;max-height:72vh;overflow-y:auto}
    .modal-foot{padding:14px 22px;border-top:1px solid var(--c-border);
      display:flex;justify-content:flex-end;gap:8px;background:var(--c-bg-subtle)}

    /* ── FORM ───────────────────────────────────────────────────── */
    .fg{margin-bottom:16px}
    .flabel{display:block;font-size:11px;font-weight:700;color:var(--c-text-muted);margin-bottom:5px;
      text-transform:uppercase;letter-spacing:.06em}
    .finput{width:100%;padding:10px 13px;border:1.5px solid var(--c-border-in);
      border-radius:var(--radius-sm);font-size:13.5px;color:var(--c-text);
      background:var(--c-bg-input);outline:none;transition:all var(--t);font-family:inherit}
    .finput:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(22,163,74,.1)}
    .finput::placeholder{color:var(--c-text-dim)}
    .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
    .ftarea{resize:vertical;min-height:70px}

    /* Assignee & priority pickers */
    .aopt-row{display:flex;gap:7px}
    .aopt{flex:1;padding:9px 5px;border-radius:var(--radius-sm);border:2px solid var(--c-border);
      cursor:pointer;text-align:center;transition:all var(--t);font-size:11.5px;
      font-weight:600;color:var(--c-text-muted);background:var(--c-bg-card)}
    .aopt:hover{border-color:var(--c-border-in);background:var(--c-bg-subtle)}
    .aopt .aico{font-size:20px;margin-bottom:4px}
    .aopt.sel-me{border-color:var(--me-color);background:var(--me-light);color:var(--me-color)}
    .aopt.sel-wife{border-color:var(--wife-color);background:var(--wife-light);color:var(--wife-color)}
    .aopt.sel-both{border-color:var(--both-color);background:var(--both-light);color:var(--both-color)}
    .aopt.sel-unassigned{border-color:var(--c-text-dim);background:var(--c-bg-subtle);color:var(--c-text-muted)}
    .popt-row{display:flex;gap:7px}
    .popt{flex:1;padding:9px;border-radius:var(--radius-sm);border:2px solid var(--c-border);
      cursor:pointer;text-align:center;font-size:12px;font-weight:600;
      transition:all var(--t);color:var(--c-text-muted);background:var(--c-bg-card)}
    .popt:hover{border-color:var(--c-border-in);background:var(--c-bg-subtle)}
    .popt.sel-high{border-color:var(--danger);background:var(--danger-lt);color:var(--danger)}
    .popt.sel-medium{border-color:var(--warn);background:var(--warn-lt);color:var(--warn)}
    .popt.sel-low{border-color:var(--ok);background:var(--ok-lt);color:var(--ok)}

    /* Complete modal options */
    .complete-opts{display:flex;gap:10px;padding:4px 0}
    .copt{flex:1;padding:16px 8px;border-radius:var(--radius);border:2px solid var(--c-border);
      cursor:pointer;text-align:center;transition:all var(--t);font-size:13.5px;
      font-weight:600;color:var(--c-text-muted);background:var(--c-bg-card)}
    .copt:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
    .copt.me{border-color:var(--me-color);color:var(--me-color)}
    .copt.me:hover{background:var(--me-light)}
    .copt.wife{border-color:var(--wife-color);color:var(--wife-color)}
    .copt.wife:hover{background:var(--wife-light)}
    .copt.both{border-color:var(--both-color);color:var(--both-color)}
    .copt.both:hover{background:var(--both-light)}

    /* ── TASK COMPLETION ANIMATION ─────────────────────────────── */
    @keyframes taskDone{
      0%{background:transparent}
      20%{background:var(--ok-lt);transform:scale(1.01)}
      100%{background:transparent;transform:scale(1)}
    }
    .task-completing{animation:taskDone .5s ease-out}
    @keyframes checkPop{
      0%{transform:scale(.5);opacity:0}
      60%{transform:scale(1.3)}
      100%{transform:scale(1);opacity:1}
    }
    .task-check.done{animation:checkPop .28s cubic-bezier(.16,1,.3,1)}

    /* ── TOAST ──────────────────────────────────────────────────── */
    .toast{position:fixed;right:18px;background:var(--c-text);color:var(--c-bg-card);
      padding:11px 18px;border-radius:100px;font-size:13px;font-weight:600;
      box-shadow:var(--shadow-lg);z-index:9999;animation:toastIn .22s cubic-bezier(.16,1,.3,1);
      bottom:18px;max-width:calc(100vw - 36px)}
    @keyframes toastIn{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}

    /* ── SUBTASKS ───────────────────────────────────────────────── */
    .subtask-list{border:1px solid var(--c-border);border-radius:var(--radius-sm);
      padding:6px 8px;min-height:32px;max-height:140px;overflow-y:auto}
    .subtask-edit-item{display:flex;align-items:center;padding:3px 0;gap:6px;
      border-bottom:1px solid var(--c-border)}
    .subtask-edit-item:last-child{border-bottom:none}
    .subtask-edit-text{flex:1;font-size:13px;color:var(--c-text)}
    .subtask-del{background:none;border:none;cursor:pointer;color:var(--c-text-dim);
      font-size:14px;padding:2px 4px;border-radius:4px;transition:all var(--t)}
    .subtask-del:hover{background:var(--danger-lt);color:var(--danger)}
    .subtask-badge{font-size:10.5px;background:var(--c-bg-subtle);color:var(--c-text-muted);
      padding:1px 7px;border-radius:100px;cursor:pointer;border:1px solid var(--c-border);
      transition:all var(--t);white-space:nowrap}
    .subtask-badge:hover{border-color:var(--primary);color:var(--primary)}
    .subtask-inline{padding:4px 0 4px 36px;display:flex;flex-direction:column;gap:3px}
    .subtask-inline-item{display:flex;align-items:center;gap:8px;font-size:12.5px;
      color:var(--c-text);cursor:pointer;padding:2px 4px;border-radius:4px;
      transition:background var(--t)}
    .subtask-inline-item:hover{background:var(--c-bg-subtle)}
    .subtask-inline-item.done{color:var(--c-text-dim);text-decoration:line-through}
    .subtask-cb{width:14px;height:14px;border:1.5px solid var(--c-border-in);border-radius:3px;
      display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;
      transition:all var(--t)}
    .subtask-cb.checked{background:var(--ok);border-color:var(--ok);color:#fff}

    /* ── CLAIM SECTION ──────────────────────────────────────────── */
    .claim-section{background:var(--c-bg-card);border-radius:var(--radius);
      border:1px solid var(--primary-lt);box-shadow:var(--shadow-sm);margin-bottom:18px;overflow:hidden}
    .claim-hdr{padding:11px 16px;background:var(--primary-lt);display:flex;
      align-items:center;justify-content:space-between}
    .claim-hdr-title{font-size:13px;font-weight:700;color:var(--primary)}
    .claim-item{display:flex;align-items:center;gap:10px;padding:10px 16px;
      border-bottom:1px solid var(--c-border)}
    .claim-item:last-child{border-bottom:none}
    .claim-info{flex:1;min-width:0}
    .claim-title{font-size:13px;font-weight:500;color:var(--c-text);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .claim-actions{display:flex;gap:6px;flex-shrink:0}
    .btn-claim{padding:4px 10px;border-radius:100px;border:1.5px solid var(--c-border);
      background:var(--c-bg-card);font-size:11.5px;font-weight:600;
      color:var(--c-text-muted);cursor:pointer;transition:all var(--t);font-family:inherit}
    .btn-claim.me:hover{border-color:var(--me-color);background:var(--me-light);color:var(--me-color)}
    .btn-claim.wife:hover{border-color:var(--wife-color);background:var(--wife-light);color:var(--wife-color)}

    /* ── MEDIA QUERIES ──────────────────────────────────────────── */
    @media(max-width:767px){
      .sidebar{display:none}
      .main{margin-left:0;padding-bottom:var(--nav-h)}
      .bottom-nav{display:block}
      .toast{bottom:calc(var(--nav-h) + 10px)}
      .stats-grid{grid-template-columns:1fr 1fr}
      .dash-grid{grid-template-columns:1fr}
      .week-grid{grid-template-columns:1fr;gap:8px}
      .charts-grid{grid-template-columns:1fr}
      .rooms-grid{grid-template-columns:1fr 1fr}
      .topbar{padding:12px 16px}
      .topbar-title{font-size:16px}
      .page{padding:16px}
      .search-box input{width:120px}
    }
    @media(max-width:480px){
      .stats-grid{grid-template-columns:1fr 1fr}
      .fgrid{grid-template-columns:1fr}
      .aopt-row{gap:4px}
      .popt-row{gap:4px}
      .topbar-right .search-box{display:none}
    }
    @media(min-width:768px){
      .bottom-nav{display:none!important}
    }
    @media(max-width:1100px){
      .stats-grid{grid-template-columns:1fr 1fr}
      .rooms-grid{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR (desktop) -->
  <nav class="sidebar" aria-label="Main navigation">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <div class="logo-icon-wrap">🏡</div>
        <div class="logo-text">HomeTask</div>
      </div>
      <div class="logo-sub" id="logoSub">Home Task Manager</div>
    </div>
    <div class="sidebar-nav" id="sidebarNav"></div>
    <div class="sidebar-bottom">
      <div class="member-chips" id="memberChips"></div>
      <div class="sidebar-actions">
        <button class="icon-btn" id="themeBtn" onclick="cycleTheme()" title="Toggle theme" aria-label="Toggle theme">🌙</button>
        <button class="icon-btn" id="notifBtn" onclick="navigate('settings')" title="Notifications" aria-label="Notifications">🔔</button>
      </div>
      <button class="sync-pill" id="syncPill" onclick="navigate('settings')"></button>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <header class="topbar">
      <div class="topbar-title" id="topbarTitle">Today</div>
      <div class="topbar-right">
        <div class="search-box">
          <span aria-hidden="true">🔍</span>
          <input type="search" id="searchInput" placeholder="Search tasks…"
                 aria-label="Search tasks" oninput="handleSearch(this.value)">
        </div>
        <button class="btn btn-primary" onclick="openCreate()">+ Add Task</button>
      </div>
    </header>
    <main class="page" id="pageContent" role="main"></main>
  </div>

  <!-- BOTTOM NAV (mobile) -->
  <nav class="bottom-nav" aria-label="Main navigation">
    <div class="bnav-inner" id="bottomNav"></div>
  </nav>

</div><!-- .app -->

<!-- TASK MODAL -->
<div class="overlay" id="taskModal" style="display:none"
     role="dialog" aria-modal="true" aria-labelledby="modalTitle"
     onclick="overlayClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <div class="modal-ttl" id="modalTitle">Add New Task</div>
      <button class="modal-x" onclick="closeModal('taskModal')" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <div class="fg">
        <label class="flabel" for="tName">Task Name *</label>
        <input type="text" class="finput" id="tName" placeholder="e.g. Vacuum the living room">
      </div>
      <div class="fgrid">
        <div class="fg">
          <label class="flabel" for="tCat">Category</label>
          <select class="finput" id="tCat">

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
const IS_LOCAL = location.protocol==='file:'||location.hostname==='localhost'||location.hostname==='127.0.0.1';

const S = {
  tasks:[], history:[], shopping:[],
  settings:{
    myName:'Me', wifeName:'Partner',
    theme:'system',
    notifications:{enabled:false, time:'08:00'}
  },
  view:'today',
  filter:{assignee:'all',frequency:'all',status:'all',search:'',cats:null},
  editId:null, selA_:'unassigned', selP_:'medium', pendingId:null,
  syncStatus:'offline', lastSynced:null,
  lastNotified:null,
  currentUser:null,
  editSubtasks_:[],
  expandedSubtasks_:new Set(),
};

// ─── JSONBIN SYNC ─────────────────────────────────────────────────────────────
function getJBConfig(){try{return JSON.parse(localStorage.getItem('hometask_jb')||'null');}catch{return null;}}
function saveJBConfig(cfg){localStorage.setItem('hometask_jb',JSON.stringify(cfg));}
function clearJBConfig(){localStorage.removeItem('hometask_jb');}
const JB_BASE='https://api.jsonbin.io/v3/b';

async function pullFromCloud(){
  const cfg=getJBConfig();if(!cfg)return false;
  try{
    const res=await fetch(`${JB_BASE}/${cfg.binId}/latest`,{headers:{'X-Master-Key':cfg.apiKey}});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const d=(await res.json()).record;
    S.tasks=d.tasks||S.tasks;S.history=d.history||S.history;S.settings={...S.settings,...d.settings};
    S.lastSynced=new Date();cacheLocal();return true;
  }catch(e){toast('Sync pull failed: '+e.message,'error');return false;}
}

async function pushToCloud(){
  const cfg=getJBConfig();if(!cfg)return;
  S.syncStatus='connecting';renderSidebar();renderBottomNav();
  try{
    const res=await fetch(`${JB_BASE}/${cfg.binId}`,{method:'PUT',
      headers:{'Content-Type':'application/json','X-Master-Key':cfg.apiKey},
      body:JSON.stringify({tasks:S.tasks,history:S.history,settings:S.settings})});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    S.syncStatus='connected';S.lastSynced=new Date();renderSidebar();renderBottomNav();
  }catch(e){S.syncStatus='error';renderSidebar();renderBottomNav();toast('Sync failed: '+e.message,'error');}
}

async function connectJSONBin(cfg){
  S.syncStatus='connecting';renderSidebar();
  saveJBConfig(cfg);
  const ok=await pullFromCloud();
  if(ok){S.syncStatus='connected';toast('☁️ Connected! Data synced.');renderAll();}
  else{await pushToCloud();if(S.syncStatus!=='error')toast('☁️ Connected! Your data is now in the cloud.');renderAll();}
}

function disconnectJSONBin(){
  clearJBConfig();S.syncStatus='offline';S.lastSynced=null;renderAll();toast('Disconnected from cloud sync');
}

// ─── PERSISTENCE ──────────────────────────────────────────────────────────────
function cacheLocal(){
  localStorage.setItem('hometask_v1',JSON.stringify({tasks:S.tasks,history:S.history,settings:S.settings,shopping:S.shopping}));
}
function save(){cacheLocal();if(getJBConfig())pushToCloud();}

function load(){
  try{
    const raw=localStorage.getItem('hometask_v1');
    if(raw){const d=JSON.parse(raw);S.tasks=d.tasks||[];S.history=d.history||[];
      S.shopping=d.shopping||[];
      if(d.settings){S.settings={...S.settings,...d.settings};
        if(d.settings.notifications)S.settings.notifications={...S.settings.notifications,...d.settings.notifications};}
    }else{S.tasks=defaultTasks();cacheLocal();}
  }catch(e){S.tasks=defaultTasks();}
  const jb=getJBConfig();
  if(jb){S.syncStatus='connecting';pullFromCloud().then(ok=>{S.syncStatus=ok?'connected':'error';renderAll();});}
}

// ─── UTILITIES ────────────────────────────────────────────────────────────────
function esc(s){if(s==null)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML;}
function fmtDate(d){return typeof d==='string'?d:d.toISOString().split('T')[0];}
function today(){return fmtDate(new Date());}
function parseD(s){return s?new Date(s+'T00:00:00'):null;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}

function nextDueDate(freq,from,intervalDays){
  const d=parseD(from)||new Date();
  if(freq==='daily')d.setDate(d.getDate()+1);
  else if(freq==='weekly')d.setDate(d.getDate()+7);
  else if(freq==='biweekly')d.setDate(d.getDate()+14);
  else if(freq==='monthly')d.setMonth(d.getMonth()+1);
  else if(freq==='quarterly')d.setMonth(d.getMonth()+3);
  else if(freq==='yearly')d.setFullYear(d.getFullYear()+1);
  else if(freq==='custom')d.setDate(d.getDate()+(intervalDays||1));
  return fmtDate(d);
}
function prevDueDate(freq,from){
  const d=parseD(from)||new Date();
  if(freq==='daily')d.setDate(d.getDate()-1);
  else if(freq==='weekly')d.setDate(d.getDate()-7);
  else if(freq==='biweekly')d.setDate(d.getDate()-14);
  else if(freq==='monthly')d.setMonth(d.getMonth()-1);
  else if(freq==='quarterly')d.setMonth(d.getMonth()-3);
  else if(freq==='yearly')d.setFullYear(d.getFullYear()-1);
  return fmtDate(d);
}
function advanceToFuture(freq,fromDue,intervalDays){
  if(freq==='asNeeded')return fromDue;
  let d=fromDue||today();
  let safety=0;
  do{d=nextDueDate(freq,d,intervalDays);safety++;}while(d<=today()&&safety<100);
  return d;
}

function taskStatus(t){
  if(t.frequency==='asNeeded'||!t.nextDue)return'upcoming';
  const diff=Math.ceil((parseD(t.nextDue)-parseD(today()))/864e5);
  if(diff<0)return'overdue';if(diff===0)return'today';if(diff<=3)return'soon';return'upcoming';
}
function daysUntil(t){if(!t.nextDue)return null;return Math.ceil((parseD(t.nextDue)-parseD(today()))/864e5);}
function dueLabel(t){
  if(t.frequency==='asNeeded')return'As needed';
  const d=daysUntil(t);if(d===null)return'';
  if(d<0)return`${Math.abs(d)}d overdue`;if(d===0)return'Due today';if(d===1)return'Due tomorrow';
  if(d<=7)return`Due in ${d}d`;return`Due ${t.nextDue}`;
}
function freqLabel(f,intervalDays){
  if(f==='custom')return intervalDays?`Every ${intervalDays}d`:'Custom';
  return{daily:'Daily',weekly:'Weekly',biweekly:'Bi-weekly',monthly:'Monthly',
    quarterly:'Quarterly',yearly:'Yearly',asNeeded:'As needed'}[f]||f;
}
function catIcon(c){
  return{Cleaning:'🧹',Kitchen:'🍳',Laundry:'👕',Bathroom:'🚿',Bedroom:'🛏',
    Garden:'🌱',Maintenance:'🔧',Shopping:'🛒',Pets:'🐾',Admin:'📋',Other:'📌'}[c]||'📌';
}
function aName(a){
  if(a==='me')return S.settings.myName;
  if(a==='wife')return S.settings.wifeName;
  if(a==='both')return'Both';return'Anyone';
}
function getFiltered(){
  let tasks=S.tasks.filter(t=>t.active!==false);
  if(S.filter.cats)tasks=tasks.filter(t=>S.filter.cats.includes(t.category));
  if(S.filter.assignee!=='all')tasks=tasks.filter(t=>t.assignedTo===S.filter.assignee||(S.filter.assignee!=='unassigned'&&t.assignedTo==='both'));
  if(S.filter.frequency!=='all')tasks=tasks.filter(t=>t.frequency===S.filter.frequency);
  if(S.filter.status!=='all')tasks=tasks.filter(t=>taskStatus(t)===S.filter.status);
  if(S.filter.search){const q=S.filter.search.toLowerCase();tasks=tasks.filter(t=>t.title.toLowerCase().includes(q)||t.category.toLowerCase().includes(q)||(t.notes&&t.notes.toLowerCase().includes(q)));}
  const ord={overdue:0,today:1,soon:2,upcoming:3};
  tasks.sort((a,b)=>{const sa=ord[taskStatus(a)]??3,sb=ord[taskStatus(b)]??3;if(sa!==sb)return sa-sb;return(a.nextDue||'').localeCompare(b.nextDue||'');});
  return tasks;
}

// ─── THEME ENGINE ─────────────────────────────────────────────────────────────
let _mqListener=null;
function applyTheme(){
  const th=S.settings.theme||'system';
  const dark=th==='dark'||(th==='system'&&matchMedia('(prefers-color-scheme:dark)').matches);
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  updateThemeBtn();
  if(_mqListener){matchMedia('(prefers-color-scheme:dark)').removeEventListener('change',_mqListener);_mqListener=null;}
  if(th==='system'){_mqListener=()=>applyTheme();matchMedia('(prefers-color-scheme:dark)').addEventListener('change',_mqListener);}
}
function cycleTheme(){
  const map={light:'dark',dark:'system',system:'light'};
  S.settings.theme=map[S.settings.theme||'system']||'light';
  applyTheme();save();if(S.view==='settings')renderPage();
}
function getEffectiveTheme(){
  const th=S.settings.theme||'system';
  return th==='system'?(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light'):th;
}
function updateThemeBtn(){
  const btn=document.getElementById('themeBtn');if(!btn)return;
  const icons={light:'🌙',dark:'☀️',system:'🖥️'};
  btn.textContent=icons[S.settings.theme||'system']||'🌙';
}

// ─── NOTIFICATIONS ────────────────────────────────────────────────────────────
let _notifTimer=null;
async function requestNotifPermission(){
  if(!('Notification' in window))return false;
  if(Notification.permission==='default'){await Notification.requestPermission();}
  return Notification.permission==='granted';
}
function sendNotif(title,body,tag='hometask'){
  if(Notification.permission!=='granted')return;
  new Notification(title,{body,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🏠</text></svg>',tag});
}
function checkOverdueNotifications(){
  if(!S.settings.notifications.enabled)return;
  if(Notification.permission!=='granted')return;
  if(S.lastNotified===today())return;
  const overdue=S.tasks.filter(t=>t.active!==false&&taskStatus(t)==='overdue').length;
  const dueToday=S.tasks.filter(t=>t.active!==false&&taskStatus(t)==='today').length;
  if(overdue+dueToday>0){
    S.lastNotified=today();
    sendNotif('🏠 HomeTask',`${overdue>0?overdue+' overdue':''}${overdue>0&&dueToday>0?', ':''}${dueToday>0?dueToday+' due today':''}`);
  }
}
function scheduleNotification(timeStr){
  if(_notifTimer){clearTimeout(_notifTimer);_notifTimer=null;}
  if(!S.settings.notifications.enabled||!S.settings.notifications.time)return;
  const [h,m]=(timeStr||'08:00').split(':').map(Number);
  const now=new Date();const fire=new Date();
  fire.setHours(h,m,0,0);
  if(fire<=now)fire.setDate(fire.getDate()+1);
  const ms=fire-now;
  _notifTimer=setTimeout(()=>{
    const overdue=S.tasks.filter(t=>t.active!==false&&taskStatus(t)==='overdue').length;
    const dueToday=S.tasks.filter(t=>t.active!==false&&taskStatus(t)==='today').length;
    if(overdue+dueToday>0)sendNotif('🏠 HomeTask Daily Reminder',`${overdue} overdue · ${dueToday} due today`);
    scheduleNotification(timeStr);
  },ms);
}
async function saveNotifSettings(){
  const enabled=document.getElementById('notifEnabled')?.checked;
  const time=document.getElementById('notifTime')?.value||'08:00';
  if(enabled&&Notification.permission!=='granted'){
    const ok=await requestNotifPermission();
    if(!ok){toast('Notification permission denied','error');return;}
  }
  S.settings.notifications={enabled:!!enabled,time};
  save();scheduleNotification(time);toast('Notification settings saved!');
  renderPage();
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
const NAV=[
  {id:'today',   label:'Today',      icon:'☀️'},
  {id:'tasks',   label:'All Tasks',  icon:'📋'},

  {id:'history', label:'History',    icon:'📜'},
  {id:'settings',label:'Settings',   icon:'⚙️'},
];
const BOTTOM_NAV=['today','tasks','rooms','shopping','settings'];

function navigate(id){

  if(id!=='tasks'){S.filter.frequency='all';S.filter.cats=null;}
  S.filter.search='';
  const si=document.getElementById('searchInput');if(si)si.value='';

// ─── RENDER ORCHESTRATION ─────────────────────────────────────────────────────
function renderAll(){renderSidebar();renderBottomNav();renderTopbar();renderPage();}

function renderSidebar(){
  const overdue=S.tasks.filter(t=>t.active!==false&&taskStatus(t)==='overdue').length;
  const dueToday=S.tasks.filter(t=>t.active!==false&&taskStatus(t)==='today').length;
  const urgent=overdue+dueToday;

  document.getElementById('sidebarNav').innerHTML=`
    <div class="nav-lbl">Navigation</div>
    ${NAV.map(n=>`<button class="nav-item${S.view===n.id?' active':''}" onclick="navigate('${n.id}')">
      <span class="nav-icon">${n.icon}</span>${esc(n.label)}
      ${n.id==='today'&&urgent>0?`<span class="nav-badge">${urgent}</span>`:''}
    </button>`).join('')}
  `;
  const todayStr=today();
  const myToday=S.history.filter(h=>h.completedAt===todayStr&&(h.completedBy==='me'||h.completedBy==='both')).length;
  const wifeToday=S.history.filter(h=>h.completedAt===todayStr&&(h.completedBy==='wife'||h.completedBy==='both')).length;
  const myLeads=myToday>wifeToday,wifeLeads=wifeToday>myToday;
  document.getElementById('memberChips').innerHTML=`
    <div class="avatar-bubble me${myLeads?' leading':''}">

function renderItem(t){

  const dl=dueLabel(t);const done=t.lastCompleted===today();

  return `
    <div class="task-item" data-task-id="${t.id}" onclick="openEdit('${t.id}')">
      <div class="task-check${done?' done':''}" onclick="event.stopPropagation();openComplete('${t.id}')"

// ─── WEEKLY VIEW ──────────────────────────────────────────────────────────────
function getWeekDays(){
  const days=[];const now=new Date();
  const dow=now.getDay();const mon=new Date(now);
  mon.setDate(now.getDate()-(dow===0?6:dow-1));
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);days.push(fmtDate(d));}
  return days;
}
function weekDayLabel(dateStr){
  const d=parseD(dateStr);
  return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric'});
}
function renderWeekly(){
  const days=getWeekDays();
  const active=S.tasks.filter(t=>t.active!==false);
  const t=today();
  return `
    <div class="week-grid">
      ${days.map(day=>{
        const dayTasks=active.filter(t=>t.nextDue===day);
        const isToday=day===t;
        const more=dayTasks.length>4?dayTasks.length-3:0;
        const show=more>0?dayTasks.slice(0,3):dayTasks;
        return `<div class="week-day${isToday?' is-today':''}">
          <div class="week-day-hdr">${weekDayLabel(day)}${isToday?' ·  Today':''}</div>
          <div class="week-day-body">
            ${show.length===0?`<div class="week-empty">Free</div>`:
              show.map(t=>`<div class="week-task" onclick="openEdit('${t.id}')" title="${esc(t.title)}">${catIcon(t.category)} ${esc(t.title)}</div>`).join('')}
            ${more>0?`<div class="week-more">+${more} more</div>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

// ─── HISTORY ─────────────────────────────────────────────────────────────────
function renderHistory(){
  const sorted=[...S.history].reverse();
  const groups={};sorted.forEach(h=>{if(!groups[h.completedAt])groups[h.completedAt]=[];groups[h.completedAt].push(h);});
  function histLabel(s){
    const diff=Math.ceil((parseD(today())-parseD(s))/864e5);
    if(diff===0)return'Today';if(diff===1)return'Yesterday';
    if(diff<7)return`${diff} days ago`;
    return parseD(s).toLocaleDateString('en-GB',{weekday:'short',month:'short',day:'numeric'});
  }
  return `<div class="tasks-wrap">
    <div class="card-hdr" style="padding:13px 16px">
      <div class="card-title">Completion History</div>
      <span style="font-size:12px;color:var(--c-text-dim)">${S.history.length} completions</span>
    </div>
    <div style="padding:12px 16px">
      ${Object.keys(groups).length===0
        ?'<div class="empty"><div class="empty-ico">📭</div><div class="empty-ttl">No history yet</div><div class="empty-sub">Complete tasks to see history</div></div>'
        :Object.entries(groups).map(([date,items])=>`
          <div style="margin-bottom:18px">
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--c-text-dim);padding:6px 0 4px">${histLabel(date)}</div>
            ${items.map(h=>{
              const task=S.tasks.find(t=>t.id===h.taskId);
              const dotCol=h.completedBy==='wife'?'var(--wife-color)':h.completedBy==='both'?'var(--both-color)':'var(--me-color)';
              const tagCls=h.completedBy==='wife'?'tag-wife':h.completedBy==='both'?'tag-both':'tag-me';
              return `<div class="hist-item">
                <div class="hist-dot" style="background:${dotCol}"></div>
                <div class="hist-info">
                  <div class="hist-title">${catIcon(task?.category||'Other')} ${task?esc(task.title):'Deleted task'}</div>
                  <div class="hist-meta">${esc(aName(h.completedBy))} · ${task?esc(task.category):''} · ${task?freqLabel(task.frequency,task.intervalDays):''}</div>
                </div>
                <span class="tag ${tagCls}">${esc(aName(h.completedBy))}</span>
              </div>`;
            }).join('')}
          </div>`).join('')}
    </div>
  </div>`;
}

// ─── POINTS / GAMIFICATION ────────────────────────────────────────────────────
function calcPoints(assignee, days=7){
  const pts={high:3,medium:2,low:1};
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-days);
  return S.history
    .filter(h=>new Date(h.completedAt+'T00:00:00')>=cutoff&&(h.completedBy===assignee||h.completedBy==='both'))
    .reduce((sum,h)=>{const t=S.tasks.find(x=>x.id===h.taskId);return sum+(pts[t?.priority||'medium']||2);},0);
}

  {id:'kitchen', label:'Kitchen',      icon:'🍳',cats:['Kitchen']},
  {id:'bathroom',label:'Bathroom',     icon:'🚿',cats:['Bathroom']},
  {id:'bedroom', label:'Bedroom',      icon:'🛏️',cats:['Bedroom']},
  {id:'living',  label:'Living Areas', icon:'🛋️',cats:['Cleaning']},
  {id:'laundry', label:'Laundry',      icon:'👕',cats:['Laundry']},
  {id:'garden',  label:'Garden',       icon:'🌱',cats:['Garden']},
  {id:'maint',   label:'Maintenance',  icon:'🔧',cats:['Maintenance']},
  {id:'other',   label:'Admin & Other',icon:'📋',cats:['Admin','Shopping','Pets','Other']},
];

function roomHealth(cats){
  const tasks=S.tasks.filter(t=>t.active!==false&&cats.includes(t.category));
  if(tasks.length===0)return 100;
  let score=100;
  tasks.forEach(t=>{
    const st=taskStatus(t);
    if(st==='overdue'){
      if(t.priority==='high')score-=20;
      else if(t.priority==='medium')score-=15;
      else score-=10;
    }else if(st==='today')score-=5;
  });
  return Math.max(0,Math.min(100,score));
}

function roomRingsvg(health){
  const r=28,cx=32,cy=32,circ=2*Math.PI*r;
  const dash=circ*(health/100),gap=circ-dash;
  const col=health>=80?'var(--ok)':health>=50?'var(--warn)':'var(--danger)';
  return `<svg width="64" height="64" viewBox="0 0 64 64">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--c-border)" stroke-width="5"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${col}" stroke-width="5"
      stroke-dasharray="${dash.toFixed(1)} ${gap.toFixed(1)}"
      stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>
    <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="central"
      font-size="13" font-weight="700" fill="${col}">${health}</text>
  </svg>`;
}

// ─── ANALYTICS CHARTS ────────────────────────────────────────────────────────
function computeWeeklyBuckets(n){
  const buckets=Array(n).fill(0);const now=new Date();
  S.history.forEach(h=>{
    const d=parseD(h.completedAt);if(!d)return;
    const wk=Math.floor((now-d)/6048e5);
    if(wk>=0&&wk<n)buckets[n-1-wk]++;
  });
  return buckets;
}
function catCompletions(){
  const m={};
  S.history.forEach(h=>{const task=S.tasks.find(t=>t.id===h.taskId);if(task){m[task.category]=(m[task.category]||0)+1;}});
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}
function renderWorkloadBar(){
  const myCnt=S.history.filter(h=>h.completedBy==='me').length;
  const wifeCnt=S.history.filter(h=>h.completedBy==='wife').length;
  const bothCnt=S.history.filter(h=>h.completedBy==='both').length;
  const myT=myCnt+Math.floor(bothCnt/2),wifeT=wifeCnt+Math.ceil(bothCnt/2);
  const total=myT+wifeT;
  if(!total)return`<div style="text-align:center;padding:24px;font-size:12px;color:var(--c-text-dim)">No completions yet</div>`;
  const r=42,cx=65,cy=65,circ=2*Math.PI*r;
  const myDash=circ*(myT/total);
  const myPct=Math.round(myT/total*100);
  return`<svg width="130" height="130" viewBox="0 0 130 130" style="display:block;margin:0 auto">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--wife-color)" stroke-width="18" opacity=".85"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--me-color)" stroke-width="18"
      stroke-dasharray="${myDash.toFixed(1)} ${(circ-myDash).toFixed(1)}"
      transform="rotate(-90 ${cx} ${cy})" opacity=".9"/>
    <text x="${cx}" y="${cy-5}" text-anchor="middle" font-size="16" font-weight="700" fill="var(--c-text)">${myPct}%</text>
    <text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="9" fill="var(--c-text-muted)">${esc(S.settings.myName)}</text>
  </svg>
  <div class="chart-legend" style="justify-content:center;margin-top:8px">
    <div class="chart-leg-item"><div class="chart-leg-dot" style="background:var(--me-color)"></div>${esc(S.settings.myName)} ${myT}</div>
    <div class="chart-leg-item"><div class="chart-leg-dot" style="background:var(--wife-color)"></div>${esc(S.settings.wifeName)} ${wifeT}</div>
  </div>`;
}
function renderCategoryChart(){
  const active=S.tasks.filter(t=>t.active!==false);
  const todayTasks=active.filter(t=>['today','overdue'].includes(taskStatus(t)));
  const doneCnt=active.filter(t=>t.lastCompleted===today()).length;
  const total=Math.max(todayTasks.length+doneCnt,1);
  const r=42,cx=65,cy=65,circ=2*Math.PI*r;
  const doneDash=circ*(doneCnt/total);
  const pct=total?Math.round(doneCnt/total*100):0;
  return`<svg width="130" height="130" viewBox="0 0 130 130" style="display:block;margin:0 auto">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--c-border)" stroke-width="18"/>
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--ok)" stroke-width="18"
      stroke-dasharray="${doneDash.toFixed(1)} ${(circ-doneDash).toFixed(1)}"
      transform="rotate(-90 ${cx} ${cy})" stroke-linecap="round"/>
    <text x="${cx}" y="${cy-5}" text-anchor="middle" font-size="18" font-weight="700" fill="var(--ok)">${pct}%</text>
    <text x="${cx}" y="${cy+12}" text-anchor="middle" font-size="9" fill="var(--c-text-muted)">done today</text>
  </svg>
  <div class="chart-legend" style="justify-content:center;margin-top:8px">
    <div class="chart-leg-item"><div class="chart-leg-dot" style="background:var(--ok)"></div>Done ${doneCnt}</div>
    <div class="chart-leg-item"><div class="chart-leg-dot" style="background:var(--c-border)"></div>Remaining ${todayTasks.length}</div>
  </div>`;
}
function renderSparkline(){
  const buckets=computeWeeklyBuckets(8);
  const max=Math.max(...buckets,1);const w=240;const h=60;
  const pts=buckets.map((v,i)=>{
    const x=Math.round(i*(w-1)/7);const y=Math.round(h-4-(v/max)*(h-8));return`${x},${y}`;
  }).join(' ');
  const filled=buckets.map((v,i)=>{
    const x=Math.round(i*(w-1)/7);const y=Math.round(h-4-(v/max)*(h-8));return`${x},${y}`;
  });
  filled.push(`${w-1},${h-4}`);filled.unshift(`0,${h-4}`);
  return `<svg width="100%" viewBox="0 0 ${w} ${h}" style="color:var(--c-text)">
    <polygon points="${filled.join(' ')}" fill="var(--primary)" opacity=".12"/>
    <polyline points="${pts}" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    ${buckets.map((v,i)=>{const x=Math.round(i*(w-1)/7);const y=Math.round(h-4-(v/max)*(h-8));return`<circle cx="${x}" cy="${y}" r="3" fill="var(--primary)"/>`;}).join('')}
  </svg>`;
}
function renderCharts(){
  return `
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-ttl">Workload Split (all time)</div>
        ${renderWorkloadBar()}
      </div>
      <div class="chart-card">

    </div>

      </div>
    </div>`;
}

function openComplete(id){
  const t=S.tasks.find(x=>x.id===id);if(!t)return;
  if(t.lastCompleted===today()){undoComplete(id);return;}
  S.pendingId=id;
  document.getElementById('compTaskName').textContent=`"${t.title}"`;
  document.getElementById('completeOpts').innerHTML=`
    <div class="copt me" onclick="doComplete('me')"><div style="font-size:22px;margin-bottom:5px">👤</div>${esc(S.settings.myName)}</div>
    <div class="copt wife" onclick="doComplete('wife')"><div style="font-size:22px;margin-bottom:5px">👤</div>${esc(S.settings.wifeName)}</div>
    <div class="copt both" onclick="doComplete('both')"><div style="font-size:22px;margin-bottom:5px">👥</div>Both</div>`;
  document.getElementById('completeModal').style.display='flex';
}
function doComplete(by){
  const id=S.pendingId;const i=S.tasks.findIndex(t=>t.id===id);if(i<0)return;
  const t=S.tasks[i];
  const streak=(t.nextDue&&t.nextDue<=today())?(t.streak||0)+1:1;
  const nextDue=t.frequency==='asNeeded'?t.nextDue:advanceToFuture(t.frequency,t.nextDue,t.intervalDays);
  S.tasks[i]={...t,lastCompleted:today(),completedBy:by,nextDue,streak};
  S.history.push({id:uid(),taskId:id,completedBy:by,completedAt:today()});
  save();closeModal('completeModal');toast(`✅ "${t.title}" completed!`);
  requestAnimationFrame(()=>{const el=document.querySelector(`[data-task-id="${id}"]`);if(el){el.classList.add('task-completing');el.addEventListener('animationend',()=>el.classList.remove('task-completing'),{once:true});}});
  renderAll();
}
function undoComplete(id){
  const i=S.tasks.findIndex(t=>t.id===id);if(i<0)return;
  const t=S.tasks[i];
  const hi=[...S.history].map(h=>h.taskId).lastIndexOf(id);
  if(hi>=0)S.history.splice(hi,1);
  S.tasks[i]={...t,lastCompleted:null,completedBy:null,nextDue:prevDueDate(t.frequency,t.nextDue),streak:Math.max(0,(t.streak||1)-1)};
  save();toast('Completion undone');renderAll();
}

// ─── SNOOZE / ARCHIVE ─────────────────────────────────────────────────────────
function snoozeAll(){
  const overdue=S.tasks.filter(t=>t.active!==false&&taskStatus(t)==='overdue');
  if(!overdue.length){toast('No overdue tasks');return;}
  overdue.forEach(t=>{
    const d=parseD(t.nextDue)||new Date();d.setDate(d.getDate()+1);
    const i=S.tasks.findIndex(x=>x.id===t.id);
    S.tasks[i]={...S.tasks[i],nextDue:fmtDate(d)};
  });
  save();toast(`⏰ Snoozed ${overdue.length} overdue task${overdue.length!==1?'s':''}`);renderAll();
}
function resetRoom(cats){
  const overdue=S.tasks.filter(t=>t.active!==false&&cats.includes(t.category)&&taskStatus(t)==='overdue');
  if(!overdue.length){toast('No overdue tasks in this room');return;}
  overdue.forEach(t=>{
    const i=S.tasks.findIndex(x=>x.id===t.id);
    S.tasks[i]={...S.tasks[i],nextDue:today()};
  });
  save();toast(`🔄 Reset ${overdue.length} task${overdue.length!==1?'s':''} to today`);renderAll();
}
function claimTask(id,who){
  const i=S.tasks.findIndex(t=>t.id===id);if(i<0)return;
  S.tasks[i]={...S.tasks[i],assignedTo:who};
  save();toast(`✅ Claimed by ${aName(who)}`);renderAll();
}
function snoozeTask(id){
  const i=S.tasks.findIndex(t=>t.id===id);if(i<0)return;
  const d=parseD(S.tasks[i].nextDue)||new Date();d.setDate(d.getDate()+1);
  S.tasks[i]={...S.tasks[i],nextDue:fmtDate(d)};
  save();toast('⏰ Snoozed 1 day');renderAll();
}
function openArchiveModal(id){
  const t=S.tasks.find(x=>x.id===id);if(!t)return;
  S.pendingId=id;
  document.getElementById('archiveTaskName').textContent=`"${t.title}"`;
  document.getElementById('archiveModal').style.display='flex';
}
function archiveTask(){
  const i=S.tasks.findIndex(t=>t.id===S.pendingId);if(i<0)return;
  S.tasks[i].active=false;save();closeModal('archiveModal');toast('Task archived');renderAll();
}
function permanentDelete(){
  S.tasks=S.tasks.filter(t=>t.id!==S.pendingId);save();closeModal('archiveModal');toast('Task deleted');renderAll();
}
function permanentDeleteId(id){
  if(!confirm('Delete permanently? This cannot be undone.'))return;
  S.tasks=S.tasks.filter(t=>t.id!==id);save();toast('Task deleted');renderAll();
}
function restoreTask(id){
  const i=S.tasks.findIndex(t=>t.id===id);if(i<0)return;
  S.tasks[i].active=true;save();toast('Task restored');renderAll();
}

// ─── DATA MANAGEMENT ──────────────────────────────────────────────────────────
function exportData(){
  const blob=new Blob([JSON.stringify({tasks:S.tasks,history:S.history,settings:S.settings},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`hometask-${today()}.json`;a.click();toast('Exported!');
}
function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);
      if(d.tasks){S.tasks=d.tasks;S.history=d.history||[];
        if(d.settings)S.settings={...S.settings,...d.settings};
        save();toast('Imported!');renderAll();}
    }catch{toast('Invalid file','error');}};r.readAsText(f);};
  inp.click();
}
function resetDefaults(){if(!confirm('Reset all tasks to defaults? History is kept.'))return;S.tasks=defaultTasks();save();toast('Reset to defaults');renderAll();}
function clearHistory(){if(!confirm('Clear all history? Cannot be undone.'))return;S.history=[];S.tasks.forEach(t=>{t.streak=0;t.lastCompleted=null;t.completedBy=null;});save();toast('History cleared');renderAll();}

// ─── MODAL / TOAST ────────────────────────────────────────────────────────────
function closeModal(id){document.getElementById(id).style.display='none';}
function overlayClick(e){if(e.target===e.currentTarget)e.currentTarget.style.display='none';}
function toast(msg,type){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  if(type==='error')t.style.background='var(--danger)';
  else if(type==='success')t.style.background='var(--ok)';
  document.body.appendChild(t);setTimeout(()=>t.remove(),3200);
}

// ─── KEYBOARD SHORTCUTS ───────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))return;
  if(e.key==='Escape'){['taskModal','completeModal','archiveModal'].forEach(id=>closeModal(id));}
  else if(e.key==='n')openCreate();
  else if(e.key==='1')navigate('today');
  else if(e.key==='2')navigate('tasks');
  else if(e.key==='3')navigate('rooms');
  else if(e.key==='4')navigate('shopping');
  else if(e.key==='5')navigate('weekly');
  else if(e.key==='6')navigate('history');
  else if(e.key==='7')navigate('settings');
});

// ─── AUTH ─────────────────────────────────────────────────────────────────────
function logout(){
  localStorage.removeItem('ht_token');
  localStorage.removeItem('ht_user');
  window.location.replace('/login');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function initApp(){
  if(!IS_LOCAL){
    const token=localStorage.getItem('ht_token');
    if(!token){window.location.replace('/login');return;}
    try{
      const res=await fetch('/api/verify?token='+encodeURIComponent(token),
        {signal:AbortSignal.timeout(3000)});
      if(!res.ok){
        localStorage.removeItem('ht_token');localStorage.removeItem('ht_user');
        window.location.replace('/login');return;
      }
      const data=await res.json();
      S.currentUser=data.user;
      localStorage.setItem('ht_user',data.user);
    }catch(e){
      // Network error or offline — allow access with cached data
      S.currentUser=localStorage.getItem('ht_user')||null;
    }
  }
  load();
  applyTheme();
  renderAll();
  checkOverdueNotifications();
  scheduleNotification(S.settings.notifications?.time||'08:00');
}
initApp();
</script>
